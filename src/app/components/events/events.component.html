<section id="events" class="events">
  <div class="events__container">
    <header class="events__header" [appReveal]="'up'">
      <span class="section-number">03</span>
      <h2 class="events__title">{{ 'myEvents' | translate }}</h2>
      <div class="events__divider"></div>
    </header>

    <div class="events__grid">
      <article
        *ngFor="let event of events; let i = index"
        class="event-card"
        [style.--accent]="event.accent"
        [appReveal]="i % 2 === 0 ? 'left' : 'right'"
        [revealDelay]="i * 120"
        (click)="open(event.url)"
        (keyup.enter)="open(event.url)"
        tabindex="0"
        [attr.aria-label]="event.name + ' · ' + ('viewOnInstagram' | translate)"
      >
        <div class="event-card__glow"></div>

        <div class="event-card__icon" [class.event-card__icon--logo]="event.logoUrl">
          <img
            *ngIf="event.logoUrl; else iconTpl"
            [src]="event.logoUrl"
            [alt]="event.name + ' logo'"
            loading="lazy"
          />
          <ng-template #iconTpl>
            <i [class]="event.icon || 'fa-solid fa-calendar-days'"></i>
          </ng-template>
        </div>

        <h3 class="event-card__name">{{ event.name }}</h3>

        <div class="event-card__meta">
          <span class="event-card__date">
            <i class="fa-regular fa-calendar"></i>
            {{ event.date }}
          </span>
          <span class="event-card__location">
            <i class="fa-solid fa-location-dot"></i>
            {{ event.location }}
          </span>
        </div>

        <span class="event-card__cta">
          <i class="fa-brands fa-instagram"></i>
          {{ 'viewOnInstagram' | translate }}
          <span class="event-card__arrow">→</span>
        </span>
      </article>
    </div>
  </div>
</section>
